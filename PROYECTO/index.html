<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hospital Esperanza</title>
  <link rel="stylesheet" href="./estilos.css" />
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>HOSPITAL ESPERANZA</h1>
    <p>Sistema de Gestión de Citas Médicas</p>
  </header>

  <!-- NAV -->
  <nav>
    <a href="login.html">Inicio</a>
    <a href="Especialidades.html">Especialidades</a> 
    <a href="Citas.html">Citas</a>
    <a href="Contacto.html">Contacto</a>
  </nav>

  <div class="container">

    <!-- TITULO -->
    <div class="header">
      <h2 class="header-title">Gestión de Citas</h2>
      <p class="header-subtitle">Registro y consulta</p>
    </div>

    <!-- FORMULARIO -->
    <div class="card">
      <h2>Agendar Cita Médica</h2>

      <form id="formCita">
        <input type="hidden" id="txtId">

        <div class="field">
          <label>Nombre Completo:</label>
          <input type="text" id="nombre_completo" required />
        </div>

        <div class="field">
          <label>Cédula:</label>
          <input type="text" id="cedula" required />
        </div>

        <!--  ESPECIALIDADES COMPLETAS -->
        <div class="field">
          <label>Especialidad:</label>
          <select id="especialidad" required>
            <option value="" disabled selected>Seleccione una especialidad</option>

            <option>Medicina General</option>
            <option>Pediatría</option>
            <option>Cardiología</option>
            <option>Ginecología</option>
            <option>Dermatología</option>
            <option>Neurología</option>
            <option>Gastroenterología</option>
            <option>Ortopedia</option>
            <option>Oftalmología</option>
            <option>Psiquiatría</option>
            <option>Endocrinología</option>
            <option>Psicología</option>
          </select>
        </div>

        <div class="field">
          <label>Fecha:</label>
          <input type="date" id="fecha_cita" required />
        </div>

        <div class="field">
          <label>Hora:</label>
          <input type="time" id="hora_cita" required />
        </div>

        <!-- BOTONES -->
        <div class="field buttons">
          <!--  CORREGIDO -->
          <button id="btnAdd" type="button" class="btn btn-success">
            Guardar
          </button>

          <button id="btnCancel" type="reset" class="btn btn-secondary">
            Cancelar
          </button>
        </div>

      </form>
    </div>

    <!-- BUSQUEDA -->
    <div class="card">
      <div class="input-with-action">
        <input type="text" id="txtSearch" placeholder="Buscar por nombre" />

        <button id="btnClear" type="button" class="btn btn-secondary">
          Limpiar
        </button>
      </div>

      <button id="btnLoad" type="button" class="btn btn-primary">
        Consultar
      </button>
    </div>

    <!-- TABLA -->
    <div class="card">
      <div class="table-wrap">
        <table id="tblpacientes">
          <thead>
            <tr>
              <th>Cédula</th>
              <th>Nombre Completo</th>
              <th>Especialidad</th>
              <th>Fecha</th>
              <th>Hora</th>
              <th>Acciones</th>
            </tr>
          </thead>

          <tbody id="tbodypacientes"></tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <footer>
    <p>&copy; Hospital Esperanza. Todos los derechos reservados.</p>
  </footer>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="module" src="./app.js"></script>

</body>
</html>
