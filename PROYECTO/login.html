<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - Hospital Esperanza</title>
  <link rel="stylesheet" href="estilos6.css">
</head>

<body>

  <div class="login-container">

    <!-- HEADER -->
    <div class="login-header">
      <h2>Hospital Esperanza</h2>
      <p>Acceso al sistema</p>
    </div>

    <!-- CUERPO -->
    <div class="login-body">

      <input type="email" id="email" placeholder="Correo">
      <input type="password" id="password" placeholder="Contraseña">

      <!-- BOTONES -->
      <div class="botones-login">
        <button id="btnLogin">Ingresar</button>
        <button id="btnLimpiar">Limpiar</button>
      </div>

      <!-- BOTÓN VOLVER (AHORA BIEN POSICIONADO) -->
      <div class="contenedor-boton">
        <a href="http://127.0.0.1:5500/PROYECTO/">
          <button class="btn-volver">Volver al Inicio</button>
        </a>
      </div>

      <!-- FOOTER -->
      <div class="login-footer">
        Sistema de gestión médica
      </div>

    </div>

  </div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="./app3.js" type="module"></script>

</body>
</html>
